<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Mobile Premium Injector</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --danger: #ff4d4d;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050508; color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050508 100%);
            z-index: -1;
        }

        .blob {
            position: absolute; width: 300px; height: 300px;
            background: var(--secondary); filter: blur(80px);
            border-radius: 50%; opacity: 0.2; animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }

        /* THÔNG BÁO CUSTOM */
        #custom-alert {
            position: fixed; top: -100px; left: 50%;
            transform: translateX(-50%);
            width: 320px; background: rgba(255, 77, 77, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--danger); border-radius: 20px;
            padding: 15px 20px; z-index: 1000;
            display: flex; align-items: center; gap: 12px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.2);
        }
        #custom-alert.show { top: 20px; }
        .alert-icon { font-size: 20px; }
        .alert-msg { font-size: 13px; font-weight: 500; color: #fff; }

        /* MENU KHỞI ĐỘNG */
        #startup-menu {
            position: relative; z-index: 100;
            width: 100%; text-align: center;
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 20px; border-radius: 40px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            transition: 0.5s ease;
        }

        .pulse-icon {
            width: 70px; height: 70px; margin: 0 auto 20px;
            border: 2px solid var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--primary);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 242, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }

        /* MAIN CARD */
        .main-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 420px;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--primary), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        input {
            width: 100%; padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px; color: #fff; font-size: 16px;
            text-align: center; outline: none; transition: 0.3s;
            margin-bottom: 20px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .btn-action {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; border-radius: 25px;
            color: white; font-weight: bold; font-size: 15px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-action:active { transform: scale(0.95); }

        #console {
            display: none; height: 200px; background: rgba(0,0,0,0.4);
            border-radius: 25px; padding: 20px; margin-bottom: 20px;
            overflow: hidden; font-family: 'Courier New', monospace;
            font-size: 12px; text-align: left; line-height: 1.6;
        }

        .log-line { opacity: 0; animation: fadeIn 0.3s forwards; color: var(--primary); }
        @keyframes fadeIn { to { opacity: 1; } }

        #final-screen { display: none; animation: scaleUp 0.5s forwards; }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .success-icon {
            width: 70px; height: 70px; background: var(--primary);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; margin: 0 auto 20px;
            box-shadow: 0 0 30px var(--primary);
        }

        .verify-btn {
            display: inline-block; margin-top: 25px;
            padding: 15px 40px; background: #fff; color: #000;
            text-decoration: none; font-weight: 800;
            border-radius: 30px; transition: 0.3s;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/4xvl32.mp3" type="audio/mpeg">
    </audio>

    <div id="custom-alert">
        <span class="alert-icon">⚠️</span>
        <span class="alert-msg" id="alert-text">Thông báo lỗi hệ thống</span>
    </div>

    <div class="bg-animate"></div>
    <div class="blob" style="top: 20%; left: 20%;"></div>
    <div class="blob" style="bottom: 10%; right: 10%; background: var(--primary);"></div>

    <div class="main-card" id="card">
        <div id="startup-menu">
            <div class="pulse-icon">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2 style="font-size: 18px; margin-bottom: 25px;">XÁC MINH TRUY CẬP</h2>
            <button class="btn-action" onclick="unlockSystem()">MỞ KHÓA MENU</button>
        </div>

        <div id="main-content" style="display: none;">
            <div id="start-screen">
                <h1>FC MOD MENU v6</h1>
                <input type="text" id="playerId" placeholder="Enter Player ID (19 digits)...">
                <button class="btn-action" onclick="startHack()">ACTIVATE EXPLOIT</button>
            </div>

            <div id="console"></div>

            <div id="final-screen">
                <div class="success-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h2 style="margin: 0; color: #fff;">INJECTED!</h2>
                <p style="font-size: 13px; color: #aaa; margin-top: 10px;">ID: <span id="res-id" style="color:var(--primary)"></span> đã được cấp quyền.</p>
                <a href="https://vuotnhanh.com/yCuy" class="verify-btn">VƯỢT LINK ĐỂ NHẬN BUFF</a>
            </div>
        </div>
    </div>

<script>
    function showAlert(msg) {
        const alertBox = document.getElementById('custom-alert');
        document.getElementById('alert-text').innerText = msg;
        alertBox.classList.add('show');
        setTimeout(() => { alertBox.classList.remove('show'); }, 3000);
    }

    function unlockSystem() {
        // Phát nhạc
        const music = document.getElementById('bgMusic');
        if(music) music.play().catch(e => console.log("Audio play deferred"));

        // Chuyển menu
        document.getElementById('startup-menu').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    const logs = [
        "> Initializing kernel exploit...",
        "> [OK] Accessing EA-Internal-API",
        "> [BYPASS] SSL Certificate Pinning...",
        "> [SMALI] Modifying PackProbability.dex",
        "> [HOOK] getPackRate() -> return 1.0",
        "> [DATA] Patching User database...",
        "> [INFO] Cleaning system logs...",
        "> All processes completed successfully."
    ];

    function startHack() {
        const id = document.getElementById('playerId').value.trim();
        if(id.length !== 19 || isNaN(id)) {
            showAlert("ID không hợp lệ! Yêu cầu đúng 19 chữ số.");
            return;
        }

        document.getElementById('start-screen').style.display = 'none';
        const consoleBox = document.getElementById('console');
        consoleBox.style.display = 'block';

        let i = 0;
        const interval = setInterval(() => {
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerText = logs[i];
            consoleBox.appendChild(div);
            consoleBox.scrollTop = consoleBox.scrollHeight;
            i++;

            if(i >= logs.length) {
                clearInterval(interval);
                setTimeout(() => {
                    consoleBox.style.display = 'none';
                    document.getElementById('res-id').innerText = id;
                    document.getElementById('final-screen').style.display = 'block';
                    document.getElementById('card').style.borderColor = 'var(--primary)';
                }, 1000);
            }
        }, 400);
    }
</script>

</body>
</html>
